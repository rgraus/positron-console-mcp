name: Deploy Extension

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  pull_request:
    branches:
      - "main"

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit Test
        run: npm test

      - name: Verify tag matches package.json version (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF#refs/tags/}
          if [ "v$PKG_VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version v$PKG_VERSION"
            exit 1
          fi

      - name: Build Extension (VSIX)
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: |
            *.vsix

  publish-open-vsx:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && github.repository_owner == 'davidrsch'
    needs:
      - build-vsix
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: .

      - name: Publish to Open VSX Registry
        run: npx ovsx publish *.vsix --skip-duplicate
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
